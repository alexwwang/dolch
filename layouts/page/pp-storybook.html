<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="/css/pp-storybook.css">
</head>
<body>
  <header class="book-header">
    <h1>{{ .Title }}</h1>
    <p class="book-subtitle">Dolch Pre-Primer Sight Words · Level PP</p>
    <p class="book-desc">目标读者：3-5 岁英语启蒙儿童 · 全系列核心角色：Sam · Pip · Ben</p>
    <nav class="story-nav">
      <strong>跳转：</strong>
      {{ range $i, $v := (seq 10) }}
        {{ $num := printf "%02d" $v }}
        <a href="#pp{{ $num }}">PP{{ $num }}</a>
      {{ end }}
    </nav>
  </header>

  <main class="book-main">
    {{ .Content }}
  </main>

  <footer class="book-footer">
    <p>Dolch Level PP 绘本系列 · 共 10 个故事 · 71 页 · 40 个高频词</p>
  </footer>

  <script>
    // Lazy loading for images
    document.addEventListener('DOMContentLoaded', function() {
      const imgs = document.querySelectorAll('.page-illustration img');
      imgs.forEach(img => {
        img.loading = 'lazy';
      });
    });
  </script>
</body>
</html>
